---
apiVersion: v1
kind: Namespace
metadata:
  name: capp-system
  labels:
    app.kubernetes.io/name: capp-backend
---
# Secret template — fill in real values and apply before the Deployment.
# Never commit actual credentials to source control.
apiVersion: v1
kind: Secret
metadata:
  name: capp-backend-secret
  namespace: capp-system
  labels:
    app.kubernetes.io/name: capp-backend
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  # Used when auth.mode is "jwt".
  jwtSecretKey: "REPLACE_ME_WITH_A_STRONG_RANDOM_SECRET"
  # Bearer token for clusters[0].credential.inline.token (passthrough mode).
  clusterToken: "REPLACE_ME_WITH_CLUSTER_SERVICE_ACCOUNT_TOKEN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capp-backend
  namespace: capp-system
  labels:
    app.kubernetes.io/name: capp-backend
    app.kubernetes.io/component: server
spec:
  # Single replica is sufficient for passthrough mode (stateless).
  # Scale to ≥2 replicas for HA; jwt mode requires a shared session store
  # (Redis) when running multiple replicas.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: capp-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: capp-backend
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: capp-backend
          image: ghcr.io/dana-team/capp-backend:latest
          imagePullPolicy: Always
          args:
            - "--config=/etc/capp/config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # JWT signing secret — only relevant when auth.mode is "jwt".
            - name: CAPP_AUTH_JWT_SECRETKEY
              valueFrom:
                secretKeyRef:
                  name: capp-backend-secret
                  key: jwtSecretKey
            # Cluster token for the first cluster entry.
            - name: CAPP_CLUSTERS_0_CREDENTIAL_INLINE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: capp-backend-secret
                  key: clusterToken
          volumeMounts:
            - name: config
              mountPath: /etc/capp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: capp-backend-config
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: capp-backend
  namespace: capp-system
  labels:
    app.kubernetes.io/name: capp-backend
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: capp-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
