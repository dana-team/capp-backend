# Default values for the Capp Helm chart.
# Each per-capp values file generated by the capp-backend publish endpoint
# overrides these defaults.

# -- Capp identity (required, overridden per capp)
name: ""
namespace: ""

# -- Container image reference (required)
image: ""

# -- Optional container name; omitted from the CR when empty
containerName: ""

# -- Autoscaling metric: concurrency | cpu | memory | rps | external
scaleMetric: "concurrency"

# -- Capp state: enabled | disabled
state: "enabled"

# -- Minimum replica count
minReplicas: 0

# -- Environment variables injected into the container
# Example:
#   env:
#     - name: LOG_LEVEL
#       value: info
env: []

# -- Volume mounts mapped into the container
# Example:
#   volumeMounts:
#     - name: data
#       mountPath: /data
volumeMounts: []

# -- External HTTP route configuration (omitted when empty)
routeSpec:
  hostname: ""
  tlsEnabled: false
  # routeTimeoutSeconds: 300

# -- Log shipping configuration (omitted when type is empty)
logSpec:
  type: ""
  host: ""
  index: ""
  user: ""
  passwordSecret: ""

# -- NFS volumes to provision (omitted when empty)
# Example:
#   nfsVolumes:
#     - name: shared
#       server: nfs.example.com
#       path: /exports/shared
#       capacity: 10Gi
nfsVolumes: []

# -- KEDA external scaler trigger sources (omitted when empty)
# Example:
#   sources:
#     - name: my-trigger
#       scalarType: kafka
#       scalarMetadata:
#         topic: events
#       minReplicas: 1
#       maxReplicas: 10
sources: []
