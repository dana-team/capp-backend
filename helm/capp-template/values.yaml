# Default values for the Capp Helm chart.
# Each per-capp values file generated by the capp-backend sync endpoint
# overrides these defaults.

# -- Capp identity (required, overridden per capp)
name: ""
namespace: ""

# -- Capp spec (deep copy of the CappSpec CRD structure).
# The sync endpoint serializes the live Capp's spec directly,
# so this schema always matches the upstream CRD definition.
spec: {}
