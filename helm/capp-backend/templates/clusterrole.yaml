{{- if eq .Values.config.auth.mode "openshift" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "capp-backend.fullname" . }}-impersonator
  labels:
    {{- include "capp-backend.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
{{- end }}
