apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: capp-user
    labels: {{- include "capp-backend.labels" . | nindent 4 }}
rules:
    - apiGroups: ["rcs.dana.io"]
      resources: ["capps"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
